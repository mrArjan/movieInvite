<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --envelope-color: #4a1c28;
            --envelope-dark: #3a151e;
            --envelope-left-right: #421823;
            --seal-color: #2b0f15;
            --letter-color: #fcf8f2;
            --text-color: #2c2c2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* Main Wrapper */
        .envelope-wrapper {
            position: relative;
            width: 450px;
            height: 300px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: scale(1.03);
        }

        /* The Solid Base Pocket Background */
        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--envelope-dark);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden; 
            z-index: 2;
        }

        /* LEFT & RIGHT FOLDS: Seals the side gaps completely */
        .envelope-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 150px solid transparent;
            border-bottom: 150px solid transparent;
            border-left: 225px solid var(--envelope-left-right);
            z-index: 4;
        }

        .envelope-body::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-top: 150px solid transparent;
            border-bottom: 150px solid transparent;
            border-right: 225px solid var(--envelope-left-right);
            z-index: 4;
        }

        /* BOTTOM FOLD: Sits cleanly over the side folds */
        .bottom-fold {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-bottom: 150px solid var(--envelope-color);
            z-index: 5;
        }

        /* Top Closing Flap */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 160px solid var(--envelope-color);
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.4s;
            z-index: 6;
            filter: drop-shadow(0px 6px 5px rgba(0,0,0,0.3));
        }

        /* Dry Seal */
        .dry-seal {
            position: absolute;
            top: 130px;
            left: 195px;
            width: 60px;
            height: 60px;
            background-color: var(--seal-color);
            border-radius: 50%;
            z-index: 7;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset 1px 1px 3px rgba(255,255,255,0.1),
                inset -2px -2px 5px rgba(0,0,0,0.6),
                0px 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.4s ease 0.2s, opacity 0.2s ease;
        }

        .dry-seal span {
            font-size: 26px;
            font-weight: bold;
            color: var(--envelope-color);
            text-shadow: 
                1px 1px 1px rgba(255,255,255,0.1), 
                -1px -1px 2px rgba(0,0,0,0.8);
            user-select: none;
        }

        /* The Tucked Invitation Letter */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 25px;
            width: 400px;
            height: 280px;
            background-color: var(--letter-color);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            z-index: 3; /* Tucked deep inside all the structural folds */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: var(--text-color);
            transform: translateY(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0s;
        }

        .letter h1 {
            font-size: 22px;
            text-align: center;
            color: #5c1d24;
            margin-bottom: 10px;
            font-style: italic;
        }

        .letter p {
            font-size: 16px;
            line-height: 1.6;
            text-align: center;
        }

        .letter .footer {
            text-align: right;
            font-style: italic;
            margin-top: 15px;
        }

        /* ================= OPEN STATE ADJUSTMENTS ================= */

        /* Allow letter to escape the envelope boundaries once animation starts */
        .envelope-wrapper.open .envelope-body {
            overflow: visible;
            transition: overflow 0s linear 0.25s;
        }

        /* Flap flips upward */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
            transition: transform 0.4s ease, z-index 0.2s ease;
        }

        /* Seal moves with the flap and fades out smoothly */
        .envelope-wrapper.open .dry-seal {
            transform: translateY(-130px) rotateX(180deg);
            opacity: 0;
            z-index: 1;
            transition: transform 0.4s ease, opacity 0.2s ease;
        }

        /* Letter glides up cleanly and lands on top of everything */
        .envelope-wrapper.open .letter {
            transform: translateY(-250px); 
            z-index: 8; /* Pops over everything completely */
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.35s;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="invitation">
        <div class="flap"></div>
        <div class="dry-seal">
            <span>H</span>
        </div>
        
        <div class="envelope-body">
            <div class="bottom-fold"></div>
            
       <div class="letter">
        <div>
            <p style="font-size: 14px; color: #888; margin-bottom: 15px; text-align: left; font-style: italic;">June 20, 2026</p>
            
            <h1>Movie Night! 🎬</h1>
            <p>Hey Holly,</p>
            <p>Down for a cozy movie night later? I was thinking we could finally watch <strong>Serendipity</strong>.</p>
        </div>
        <div>
            <p style="font-size: 14px; color: #666; margin-top: 10px;">
                <em>We can figure out the exact time as soon as both of our schedules clear up tonight.</em>
            </p>
            <p class="footer">Arjan</p>
            <br/>
        </div>
    </div>
        </div>
    </div>

    <script>
        const invitation = document.getElementById('invitation');
        invitation.addEventListener('click', () => {
            invitation.classList.toggle('open');
        });
    </script>

</body>
</html>
